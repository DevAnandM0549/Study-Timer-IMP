spring.application.name=smart-study-timer
server.port=${PORT:8080}

# H2 Database Configuration - FILE BASED (data persists)
spring.datasource.url=jdbc:h2:file:./studytimerdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true 

# Logging
logging.level.com.studytimer=INFO

# Perplexity AI Configuration
# IMPORTANT: Replace 'your-api-key-here' with your actual key for local testing
# For production, set PERPLEXITY_API_KEY environment variable in Railway
perplexity.api.key=${PERPLEXITY_API_KEY:your-api-key-here}
perplexity.api.url=https://api.perplexity.ai/chat/completions
